<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sing-Box 可视化配置编辑器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-left: 10px;
        }

        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #059669; }
        .btn-warning { background: #f59e0b; }
        .btn-warning:hover { background: #d97706; }

        .container { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 250px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .file-list { list-style: none; overflow-y: auto; flex: 1; padding: 1rem 0; }
        .file-item {
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-item:hover, .file-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent);
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.3);
            position: relative;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
        }

        .tab {
            padding: 1rem 2rem;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab.active {
            color: var(--text-main);
            border-bottom-color: var(--accent);
            background: rgba(255,255,255,0.02);
        }

        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 2rem; }
        .tab-content.active { display: block; }

        /* Accordion Details */
        details {
            margin-bottom: 1rem;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.5rem 1.5rem;
            transition: background 0.3s;
        }
        details[open] { background: rgba(30, 41, 59, 0.8); padding-bottom: 1.5rem; }
        
        summary.section-title {
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 1rem 0;
            list-style: none;
            display: flex;
            align-items: center;
            color: #e2e8f0;
            user-select: none;
        }
        summary::-webkit-details-marker { display: none; }
        summary::before {
            content: '▶';
            font-size: 0.8rem;
            margin-right: 12px;
            transition: transform 0.3s;
            color: var(--accent);
        }
        details[open] summary::before { transform: rotate(90deg); }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.2);
        }

        .card h3 {
            margin-bottom: 1rem;
            font-size: 1.05rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tag-badge { background: rgba(59, 130, 246, 0.2); color: #93c5fd; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; }
        .tag-badge-group { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; }
        .tag-badge-rule { background: rgba(168, 85, 247, 0.2); color: #d8b4fe; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; }

        .input-group { margin-bottom: 1rem; }
        .input-group:last-child { margin-bottom: 0; }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            transition: border-color 0.3s;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.4;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        #code-editor {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            padding: 1.5rem;
            border: none;
            border-radius: 8px;
            resize: none;
        }
        #code-editor:focus { outline: none; }

        #welcome-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            z-index: 5;
        }

        #fallback-file-input { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Sing-Box Studio</h1>
        <div>
            <button class="btn" id="btn-open-dir">📂 打开本地文件夹</button>
            <input type="file" id="fallback-file-input" accept=".json,.yaml" />
            <button class="btn" id="btn-fallback-open" style="display: none; background: var(--panel-bg); border: 1px solid var(--border-color);">📂 打开配置文件</button>
            <button class="btn btn-warning" id="btn-save-as" style="display: none;">💾 另存为...</button>
            <button class="btn btn-success" id="btn-save" style="display: none;">💾 保存文件</button>
        </div>
    </header>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <ul class="file-list" id="file-list"></ul>
        </div>

        <div class="workspace" id="workspace" style="display: none;">
            <div class="tabs">
                <div class="tab active" data-target="tab-visual">✨ 全局可视化配置</div>
                <div class="tab" data-target="tab-code">💻 源代码编辑</div>
            </div>

            <div class="tab-content active" id="tab-visual">
                
                <details>
                    <summary class="section-title">入站配置 (Inbounds)</summary>
                    <div class="card-grid" id="inbounds-grid"></div>
                </details>

                <details>
                    <summary class="section-title">DNS 服务器 (DNS Servers)</summary>
                    <div class="card-grid" id="dns-servers-grid"></div>
                </details>

                <details>
                    <summary class="section-title">DNS 规则 (DNS Rules)</summary>
                    <div class="card-grid" id="dns-rules-grid"></div>
                </details>

                <details>
                    <summary class="section-title">路由规则 (Route Rules)</summary>
                    <div class="card-grid" id="route-rules-grid"></div>
                </details>

                <details>
                    <summary class="section-title">分流策略组 (Outbounds: Groups)</summary>
                    <div class="card-grid" id="groups-grid"></div>
                </details>

                <details>
                    <summary class="section-title">代理节点 (Outbounds: Proxies)</summary>
                    <div class="card-grid" id="nodes-grid"></div>
                </details>

            </div>

            <div class="tab-content" id="tab-code" style="padding: 0;">
                <textarea id="code-editor"></textarea>
            </div>
        </div>

        <div id="welcome-screen">
            <h1 style="font-size: 2.5rem; background: linear-gradient(45deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">欢迎使用 Sing-Box Studio</h1>
            <p style="color: var(--text-muted); margin: 1rem 0 2rem;">纯本地浏览器工具，可视化管理你的全部节点与路由策略。</p>
            <button class="btn" id="btn-main-action" style="padding: 1rem 2rem; font-size: 1.1rem;">打开配置文件</button>
        </div>
    </div>

    <script>
        let directoryHandle;
        let currentFileHandle = null;
        let configData = null;
        let currentFileName = "config.json";
        
        const isFSApiSupported = 'showDirectoryPicker' in window;

        const btnOpenDir = document.getElementById('btn-open-dir');
        const btnFallbackOpen = document.getElementById('btn-fallback-open');
        const fallbackFileInput = document.getElementById('fallback-file-input');
        const btnSave = document.getElementById('btn-save');
        const btnSaveAs = document.getElementById('btn-save-as');
        const btnMainAction = document.getElementById('btn-main-action');
        
        const fileList = document.getElementById('file-list');
        const sidebar = document.getElementById('sidebar');
        const workspace = document.getElementById('workspace');
        const welcomeScreen = document.getElementById('welcome-screen');
        const codeEditor = document.getElementById('code-editor');

        // Setup UI based on browser support
        if (!isFSApiSupported) {
            btnOpenDir.style.display = 'none';
            btnFallbackOpen.style.display = 'inline-block';
            sidebar.style.display = 'none';
        }

        // Tab Switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');
                
                if(tab.dataset.target === 'tab-visual') {
                    try {
                        configData = JSON.parse(codeEditor.value);
                        renderVisualEditor();
                    } catch(e) {
                        alert("JSON 格式错误，无法生成可视化界面！请在代码模式下修复。");
                        document.querySelector('[data-target="tab-code"]').click();
                    }
                }
            });
        });

        const handleOpenDirectory = async () => {
            try {
                directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                await loadFileList();
                welcomeScreen.style.display = 'none';
                workspace.style.display = 'flex';
            } catch (err) { }
        };

        btnOpenDir.addEventListener('click', handleOpenDirectory);
        if(isFSApiSupported) btnMainAction.addEventListener('click', handleOpenDirectory);

        async function loadFileList() {
            fileList.innerHTML = '';
            for await (const entry of directoryHandle.values()) {
                if (entry.kind === 'file' && (entry.name.endsWith('.json') || entry.name.endsWith('.yaml'))) {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `📄 ${entry.name}`;
                    li.onclick = () => loadFile(entry, li);
                    fileList.appendChild(li);
                }
            }
        }

        async function loadFile(fileHandle, listItem) {
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            listItem.classList.add('active');
            currentFileHandle = fileHandle;
            currentFileName = fileHandle.name;
            btnSave.style.display = 'inline-block';
            btnSaveAs.style.display = 'inline-block';

            const file = await fileHandle.getFile();
            const text = await file.text();
            processFileContent(text, currentFileName);
        }

        const handleFallbackOpen = () => fallbackFileInput.click();
        btnFallbackOpen.addEventListener('click', handleFallbackOpen);
        if(!isFSApiSupported) btnMainAction.addEventListener('click', handleFallbackOpen);

        fallbackFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFileName = file.name;
            btnSave.style.display = 'inline-block';
            btnSaveAs.style.display = 'inline-block';
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                processFileContent(ev.target.result, currentFileName);
                welcomeScreen.style.display = 'none';
                workspace.style.display = 'flex';
            };
            reader.readAsText(file);
            fallbackFileInput.value = '';
        });

        function processFileContent(text, fileName) {
            codeEditor.value = text;
            try {
                if(fileName.endsWith('.json')){
                    configData = JSON.parse(text);
                    renderVisualEditor();
                    document.querySelector('[data-target="tab-visual"]').click();
                } else {
                    document.querySelector('[data-target="tab-code"]').click();
                }
            } catch(e) {
                document.querySelector('[data-target="tab-code"]').click();
            }
        }

        // --- Helper to convert array to textarea string ---
        function arrayToText(arr) {
            if (!arr) return "";
            if (Array.isArray(arr)) return arr.join('\n');
            return arr.toString();
        }

        function renderVisualEditor() {
            if (!configData) return;

            const renderGrid = (id, items, renderFn) => {
                const grid = document.getElementById(id);
                grid.innerHTML = '';
                if(items) items.forEach((item, idx) => grid.appendChild(renderFn(item, idx)));
            };

            // 1. Inbounds
            renderGrid('inbounds-grid', configData.inbounds, (ob, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${ob.tag || 'Unnamed'} <span class="tag-badge">${(ob.type||'').toUpperCase()}</span></h3>
                    <div class="input-group">
                        <label>Listen (监听地址)</label>
                        <input type="text" data-sec="inbounds" data-idx="${i}" data-key="listen" value="${ob.listen || ''}">
                    </div>
                    <div class="input-group">
                        <label>Listen Port (监听端口)</label>
                        <input type="number" data-sec="inbounds" data-idx="${i}" data-key="listen_port" value="${ob.listen_port || ''}">
                    </div>
                `;
                return card;
            });

            // 2. DNS Servers
            renderGrid('dns-servers-grid', configData.dns?.servers, (ds, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${ds.tag || 'Unnamed'} <span class="tag-badge">${(ds.type||'').toUpperCase()}</span></h3>
                    <div class="input-group">
                        <label>Server/Address (服务器地址)</label>
                        <input type="text" data-sec="dns.servers" data-idx="${i}" data-key="server" value="${ds.server || ds.address || ''}">
                    </div>
                `;
                return card;
            });

            // 3. DNS Rules
            renderGrid('dns-rules-grid', configData.dns?.rules, (r, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                let matchersHtml = '';
                for (let k in r) {
                    if (k === 'server') continue;
                    matchersHtml += `
                    <div class="input-group">
                        <label>${k} (匹配规则)</label>
                        <textarea data-sec="dns.rules" data-idx="${i}" data-key="${k}">${arrayToText(r[k])}</textarea>
                    </div>`;
                }
                
                card.innerHTML = `
                    <h3>Rule #${i+1} <span class="tag-badge-rule">DNS RULE</span></h3>
                    ${matchersHtml || '<p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:1rem;">(全局默认规则)</p>'}
                    <div class="input-group">
                        <label>目标 DNS 服务器 (server)</label>
                        <input type="text" data-sec="dns.rules" data-idx="${i}" data-key="server" value="${r.server || ''}">
                    </div>
                `;
                return card;
            });

            // 4. Route Rules
            renderGrid('route-rules-grid', configData.route?.rules, (r, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let matchersHtml = '';
                for (let k in r) {
                    if (k === 'outbound') continue;
                    matchersHtml += `
                    <div class="input-group">
                        <label>${k} (匹配规则)</label>
                        <textarea data-sec="route.rules" data-idx="${i}" data-key="${k}">${arrayToText(r[k])}</textarea>
                    </div>`;
                }

                card.innerHTML = `
                    <h3>Rule #${i+1} <span class="tag-badge-rule">ROUTE RULE</span></h3>
                    ${matchersHtml || '<p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:1rem;">(全局默认规则)</p>'}
                    <div class="input-group">
                        <label>目标出站组/节点 (outbound)</label>
                        <input type="text" data-sec="route.rules" data-idx="${i}" data-key="outbound" value="${r.outbound || ''}">
                    </div>
                `;
                return card;
            });

            // 5 & 6. Outbounds (Groups & Nodes)
            const groupsGrid = document.getElementById('groups-grid');
            const nodesGrid = document.getElementById('nodes-grid');
            groupsGrid.innerHTML = '';
            nodesGrid.innerHTML = '';
            
            if (configData.outbounds) {
                configData.outbounds.forEach((ob, i) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    if (['selector', 'urltest'].includes(ob.type)) {
                        card.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                                <h3 style="margin-bottom:0;">${ob.tag}</h3>
                                <select data-sec="outbounds" data-idx="${i}" data-key="type" style="background:rgba(0,0,0,0.5); color:var(--text-main); border:1px solid var(--accent); padding:0.3rem 0.6rem; border-radius:6px; font-size:0.85rem; outline:none; cursor:pointer;">
                                    <option value="selector" ${ob.type === 'selector' ? 'selected' : ''}>SELECTOR (手动选择)</option>
                                    <option value="urltest" ${ob.type === 'urltest' ? 'selected' : ''}>URLTEST (自动测速)</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>包含的节点/组 (每行一个)</label>
                                <textarea data-sec="outbounds" data-idx="${i}" data-key="outbounds">${arrayToText(ob.outbounds)}</textarea>
                            </div>
                        `;
                        groupsGrid.appendChild(card);
                    } else if (['vless', 'trojan', 'shadowsocks', 'vmess', 'hysteria2', 'tuic'].includes(ob.type)) {
                        let proxyIp = "";
                        if(ob.transport && ob.transport.path && ob.transport.path.includes('proxyip=')) {
                            proxyIp = ob.transport.path.split('proxyip=')[1].split('&')[0];
                        }
                        card.innerHTML = `
                            <h3>${ob.tag} <span class="tag-badge">${ob.type.toUpperCase()}</span></h3>
                            <div class="input-group">
                                <label>服务器 (Server)</label>
                                <input type="text" data-sec="outbounds" data-idx="${i}" data-key="server" value="${ob.server || ''}">
                            </div>
                            <div class="input-group">
                                <label>端口 (Port)</label>
                                <input type="number" data-sec="outbounds" data-idx="${i}" data-key="server_port" value="${ob.server_port || ''}">
                            </div>
                            ${ob.transport && ob.transport.type === 'ws' ? `
                            <div class="input-group">
                                <label>Proxy IP (用于跳板)</label>
                                <input type="text" data-sec="outbounds" data-idx="${i}" data-key="proxyip" value="${proxyIp}">
                            </div>` : ''}
                        `;
                        nodesGrid.appendChild(card);
                    }
                });
            }

            // Bind Universal Change Listener
            document.querySelectorAll('#tab-visual input, #tab-visual textarea, #tab-visual select').forEach(el => {
                el.addEventListener('change', (e) => {
                    const sec = e.target.dataset.sec;
                    const idx = e.target.dataset.idx;
                    const key = e.target.dataset.key;
                    let val = e.target.value;
                    
                    // Parse values
                    if (e.target.type === 'number') val = parseInt(val);
                    else if (e.target.tagName === 'TEXTAREA') {
                        val = val.split('\n').map(s => s.trim()).filter(s => s !== "");
                        if(val.length === 0) val = undefined;
                    }

                    // Traverse and set value
                    let targetObj;
                    if(sec === 'inbounds') targetObj = configData.inbounds[idx];
                    else if(sec === 'dns.servers') targetObj = configData.dns.servers[idx];
                    else if(sec === 'dns.rules') targetObj = configData.dns.rules[idx];
                    else if(sec === 'route.rules') targetObj = configData.route.rules[idx];
                    else if(sec === 'outbounds') targetObj = configData.outbounds[idx];

                    if (targetObj) {
                        if (key === 'proxyip' && targetObj.transport) {
                            let path = targetObj.transport.path;
                            if(path.includes('proxyip=')) targetObj.transport.path = path.replace(/proxyip=[^&]+/, 'proxyip=' + val);
                            else targetObj.transport.path = path + (path.includes('?') ? '&' : '?') + 'proxyip=' + val;
                        } 
                        else if (key === 'server' && targetObj.address !== undefined) {
                            targetObj.address = val;
                        }
                        else if (key === 'type') {
                            targetObj.type = val;
                            if (val === 'selector') {
                                delete targetObj.url;
                                delete targetObj.interval;
                                delete targetObj.tolerance;
                            } else if (val === 'urltest') {
                                delete targetObj.default;
                                if (!targetObj.url) targetObj.url = "https://www.gstatic.com/generate_204";
                                if (!targetObj.interval) targetObj.interval = "3m";
                            }
                        }
                        else {
                            if (val === undefined) delete targetObj[key];
                            else targetObj[key] = val;
                        }
                    }

                    codeEditor.value = JSON.stringify(configData, null, 2);
                });
            });
        }

        async function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        btnSave.addEventListener('click', async () => {
            const content = codeEditor.value;
            if (isFSApiSupported && currentFileHandle) {
                try {
                    const writable = await currentFileHandle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    const originalText = btnSave.innerText;
                    btnSave.innerText = "✅ 保存成功!";
                    setTimeout(() => btnSave.innerText = originalText, 2000);
                } catch (err) { alert("保存失败！无权限。"); }
            } else {
                triggerDownload(content, currentFileName);
                const originalText = btnSave.innerText;
                btnSave.innerText = "✅ 已触发下载";
                setTimeout(() => btnSave.innerText = originalText, 2000);
            }
        });

        btnSaveAs.addEventListener('click', async () => {
            const content = codeEditor.value;
            if (isFSApiSupported) {
                try {
                    const newHandle = await window.showSaveFilePicker({
                        suggestedName: currentFileName,
                        types: [{ description: 'JSON File', accept: {'application/json': ['.json']} }]
                    });
                    const writable = await newHandle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    const originalText = btnSaveAs.innerText;
                    btnSaveAs.innerText = "✅ 另存为成功!";
                    setTimeout(() => btnSaveAs.innerText = originalText, 2000);
                } catch (err) {}
            } else {
                const newName = prompt("请输入要另存为的文件名 (例如 config_new.json):", currentFileName);
                if(newName) triggerDownload(content, newName);
            }
        });
    </script>
</body>
</html>
